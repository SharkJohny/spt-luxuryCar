<!--
  hreflang trio pre cross-doménovú alternáciu sk ↔ cz.
  Inject do <head> KAŽDEJ stránky cez Shoptet template injection.

  IMPLEMENTÁCIA:
  - Pre product pages: cez {{product.url}} alebo Shoptet template variable.
    Mapping je automaticky reciprocal — sk produkt 'X' = cz produkt 'X'
    (slugy ostávajú teraz slovenské na oboch doménach, slug-translate
    sprint je separátny task).
  - Pre static pages (homepage, /o-nas, /kontakty, /faq, /galeria):
    nahradiť {{cesta}} hardcoded path-om per page (mapping table nižšie).
  - Pre kategórie: cez Shoptet template loop.

  VALIDÁCIA: https://www.aleydasolis.com/english/international-seo-tools/hreflang-tags-generator/
              alebo Screaming Frog SEO Spider.
-->

<link rel="alternate" hreflang="sk-SK" href="https://www.luxurycardesign.sk/{{cesta}}">
<link rel="alternate" hreflang="cs-CZ" href="https://www.luxurycardesign.cz/{{cesta}}">
<link rel="alternate" hreflang="x-default" href="https://www.luxurycardesign.sk/{{cesta}}">
