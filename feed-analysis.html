<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
const meta = document.getElementById('meta');
meta.textContent = `CZ: ${DATA.cz_count} produktů (CZK)  •  SK: ${DATA.sk_count} produktů (EUR)  •  Spárováno: ${DATA.pairs.filter(p=>p.cz&&p.sk).length}`;

const fmt = (v, cur) => {
  if (v == null || v === '') return '—';
  const n = Number(v);
  if (Number.isNaN(n)) return v;
  return n.toLocaleString('cs-CZ', {maximumFractionDigits: 2}) + (cur ? ' ' + cur : '');
};

function pricePair(czV, czCur, skV, skCur) {
  const has = (x) => x != null && x !== '' && !Number.isNaN(Number(x));
  if (has(czV) && has(skV)) {
    return `<span class="pricepair"><span class="cz">${fmt(czV,'Kč')}</span><span class="sep">·</span><span class="sk">${fmt(skV,'€')}</span></span>`;
  }
  if (has(czV)) return `<span class="pricepair"><span class="single-cz">CZ ${fmt(czV,'Kč')}</span></span>`;
  if (has(skV)) return `<span class="pricepair"><span class="single-sk">SK ${fmt(skV,'€')}</span></span>`;
  return '';
}

function escape(s) { return (s||'').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }

function valueChip(czName, czPrice, skName, skPrice) {
  const cz = czPrice != null && czPrice !== '';
  const sk = skPrice != null && skPrice !== '';
  let cls = 'v';
  const num = (x) => x == null || x === '' ? null : Number(x);
  const cn = num(czPrice), sn = num(skPrice);
  if (cn === 0 && sn === 0) cls += ' zero';
  if (!cz || !sk) cls += ' missing';
  const name = escape(czName || skName || '');
  const altName = (czName && skName && czName !== skName) ? `<span class="vname-sk">/ ${escape(skName)}</span>` : '';
  return `<span class="${cls}"><span class="vname">${name}</span>${altName}<span class="vprice">${pricePair(czPrice,'Kč',skPrice,'€') || '—'}</span></span>`;
}

// Pair surcharge groups: by SHORT_NAME if both present, else by index.
function pairSurcharges(czS, skS) {
  const cz = czS || [], sk = skS || [];
  const byShort = new Map();
  cz.forEach((g,i) => { if (g.short) byShort.set('cz:'+g.short.toLowerCase(), i); });
  const skUsed = new Set();
  const result = [];
  cz.forEach((g, i) => {
    let match = -1;
    if (g.short) {
      sk.forEach((sg, j) => {
        if (match === -1 && !skUsed.has(j) && sg.short && sg.short.toLowerCase() === g.short.toLowerCase()) match = j;
      });
    }
    if (match === -1 && i < sk.length && !skUsed.has(i)) match = i;
    if (match >= 0) skUsed.add(match);
    result.push({ cz: g, sk: match >= 0 ? sk[match] : null });
  });
  sk.forEach((sg, j) => { if (!skUsed.has(j)) result.push({ cz: null, sk: sg }); });
  return result;
}

// Pair values within a surcharge group: try by name, fallback by index.
function pairValues(cz, sk) {
  const out = [];
  const skUsed = new Set();
  cz.forEach((cv, i) => {
    let match = -1;
    sk.forEach((sv, j) => {
      if (match === -1 && !skUsed.has(j) && sv.name && cv.name && sv.name.toLowerCase() === cv.name.toLowerCase()) match = j;
    });
    if (match === -1 && i < sk.length && !skUsed.has(i)) match = i;
    if (match >= 0) skUsed.add(match);
    out.push({ cz: cv, sk: match >= 0 ? sk[match] : null });
  });
  sk.forEach((sv, j) => { if (!skUsed.has(j)) out.push({ cz: null, sk: sv }); });
  return out;
}

// Pair variants by their first PARAMETER value (the color/option).
function pairVariants(czV, skV) {
  const cz = czV || [], sk = skV || [];
  const key = (v) => (v.params && v.params[0] ? v.params[0].value : v.code || '').toLowerCase();
  const skUsed = new Set();
  const out = [];
  cz.forEach((cv, i) => {
    let match = -1;
    const k = key(cv);
    sk.forEach((sv, j) => {
      if (match === -1 && !skUsed.has(j) && key(sv) === k) match = j;
    });
    if (match === -1 && i < sk.length && !skUsed.has(i)) match = i;
    if (match >= 0) skUsed.add(match);
    out.push({ cz: cv, sk: match >= 0 ? sk[match] : null });
  });
  sk.forEach((sv, j) => { if (!skUsed.has(j)) out.push({ cz: null, sk: sv }); });
  return out;
}

function renderProduct(pair, idx) {
  const cz = pair.cz, sk = pair.sk;
  const head = cz || sk;
  const tag = cz && sk ? '<span class="lang-tag both">CZ + SK</span>'
            : cz ? '<span class="lang-tag cz">jen CZ</span>'
            : '<span class="lang-tag sk">jen SK</span>';
  const altName = (cz && sk && cz.name !== sk.name) ? ` <span style="color:#888;font-weight:400;font-size:13px">/ ${escape(sk.name)}</span>` : '';

  // Base price (from first variant)
  const basePrice = pricePair(cz && cz.price, 'Kč', sk && sk.price, '€');
  const stdPrice  = pricePair(cz && cz.std_price, 'Kč', sk && sk.std_price, '€');

  // Variants: pair, then list condensed
  const vp = pairVariants(cz && cz.variants, sk && sk.variants);
  const variantHtml = vp.map(({cz: cv, sk: sv}) => {
    const head = cv || sv;
    const label = (head.params && head.params[0]) ? `${escape(head.params[0].name)}: ${escape(head.params[0].value)}` : escape(head.code || '');
    const code = `<span class="vcode">${escape((cv && cv.code) || (sv && sv.code) || '')}</span>`;
    return `<div class="var-line">${code}${label} ${pricePair(cv && cv.price,'Kč', sv && sv.price,'€')}</div>`;
  }).join('');

  // Surcharges
  const sp = pairSurcharges(cz && cz.surcharges, sk && sk.surcharges);
  const surchargeHtml = sp.map(({cz: cg, sk: sg}) => {
    const head = cg || sg;
    const altGname = (cg && sg && cg.name !== sg.name) ? `<span class="gname-sk">/ ${escape(sg.name)}</span>` : '';
    const req = ((cg && cg.required === '1') || (sg && sg.required === '1')) ? '<span class="req">povinné</span>' : '';
    const values = pairValues((cg && cg.values) || [], (sg && sg.values) || []);
    const chips = values.map(({cz: cv, sk: sv}) => valueChip(cv && cv.name, cv && cv.price, sv && sv.name, sv && sv.price)).join(' ');
    return `<div class="group"><div class="gname">${escape(head.name)}${altGname}${req}</div><div class="values">${chips}</div></div>`;
  }).join('');

  return `<section class="product" id="p${idx}" data-search="${escape(((cz&&cz.name)||'') + ' ' + ((sk&&sk.name)||'') + ' ' + ((cz&&cz.id)||'') + ' ' + ((sk&&sk.id)||''))}">
    <h2>${tag}${escape(head.name)}${altName}</h2>
    <div class="ids">CZ id: ${escape((cz&&cz.id)||'—')}  •  SK id: ${escape((sk&&sk.id)||'—')}  •  Variant: ${(cz&&cz.variants.length)||0} CZ / ${(sk&&sk.variants.length)||0} SK  •  Příplatk. skupin: ${(cz&&cz.surcharges.length)||0} CZ / ${(sk&&sk.surcharges.length)||0} SK</div>
    <div class="row"><div class="label">Základní cena</div><div class="body">${basePrice||'—'} <span style="color:#888;font-size:11px">(z první varianty)</span> &nbsp; standard: ${stdPrice||'—'}</div></div>
    <div class="row"><div class="label">Varianty / barvy</div><div class="body"><details ${vp.length<=8?'open':''}><summary>${vp.length} variant${vp.length===1?'a':vp.length<5?'y':''}</summary>${variantHtml || '<div class="nopair">žádné varianty</div>'}</details></div></div>
    <div class="row"><div class="label">Příplatky</div><div class="body">${surchargeHtml || '<div class="nopair">žádné příplatky</div>'}</div></div>
    ${(!cz || !sk) ? `<div class="nopair">⚠️ Produkt existuje jen v ${cz?'CZ':'SK'} feedu — bez protějšku.</div>` : ''}
  </section>`;
}

const app = document.getElementById('app');
const toc = document.getElementById('toc');
const pairs = DATA.pairs;
app.innerHTML = pairs.map((p,i) => renderProduct(p,i)).join('');
toc.innerHTML = pairs.map((p,i) => {
  const n = (p.cz && p.cz.name) || (p.sk && p.sk.name) || ('#'+i);
  const tag = p.cz && p.sk ? '' : (p.cz ? ' (CZ only)' : ' (SK only)');
  return `<a href="#p${i}">${escape(n.length>50?n.slice(0,48)+'…':n)}${tag}</a>`;
}).join('');

const q = document.getElementById('q');
q.addEventListener('input', () => {
  const v = q.value.trim().toLowerCase();
  document.querySelectorAll('.product').forEach(el => {
    el.style.display = !v || el.getAttribute('data-search').toLowerCase().includes(v) ? '' : 'none';
  });
});
</script>
</body>
</html>
