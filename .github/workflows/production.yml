on: push
name: 🚀 Deploy website on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # Nastavení Node.js
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Získání verze z git commitu (prvních 7 znaků SHA)//
      - name: 🔖 Get build version
        id: version
        run: echo "sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Instalace závislostí a build projektu
      - name: 🔨 Build Project
        run: |
          yarn install
          yarn esbuild assets/js/main.js --bundle --outfile=assets/js/luxuryCar.js --format=esm --loader:.jsx=jsx --drop:console
          echo "{\"v\":\"${{ steps.version.outputs.sha }}\"}" > assets/js/version.json

      - name: SFTP Upload
        uses: Dylan700/sftp-upload-action@latest
        with:
          server: ftp.myshoptet.com
          username: git_444591
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 22
          uploads: |
            ./assets/ => eshopy/luxuryCar/assets/
          ignore: |
            .git
            node_modules
